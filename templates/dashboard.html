<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard BI - COOPORIGEN</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#eef2f3;
            overflow:hidden;
        }

        /* ===== HEADER ===== */

        .topbar{
            height:82px;
            background:linear-gradient(90deg, #3D9588, #245B63);
            color:white;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:0 28px;

            border-bottom:3px solid #D4AF37;

            box-shadow:0 4px 15px rgba(0,0,0,0.15);
        }

        /* ===== LEFT ===== */

        .left-section{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .logo{
            width:52px;
            height:52px;
            border-radius:10px;
            object-fit:contain;
            background:white;
            padding:4px;
        }

        .title-box h1{
            font-size:20px;
            margin-bottom:3px;
            font-weight:bold;
        }

        .title-box span{
            font-size:12px;
            opacity:0.90;
            letter-spacing:0.5px;
        }

        /* ===== RIGHT ===== */

        .right-section{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .support-box{
            background:rgba(255,255,255,0.10);
            padding:10px 16px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.10);
            text-align:left;
            min-width:290px;
        }

        .support-title{
            color:#FFD86B;
            font-size:11px;
            font-weight:bold;
            letter-spacing:1px;
            margin-bottom:4px;
        }

        .support-info{
            font-size:12px;
            line-height:18px;
        }

        .logout-btn{
            background:#D4AF37;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#b9962f;
        }

        /* ===== POWER BI ===== */

        .iframe-container{
            width:100%;
            height:calc(100vh - 82px);
            background:#dfe5e8;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
            display:block;
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:1100px){

            .topbar{
                height:auto;
                padding:18px;
                flex-direction:column;
                gap:15px;
                align-items:flex-start;
            }

            .right-section{
                width:100%;
                justify-content:space-between;
            }

            .iframe-container{
                height:calc(100vh - 150px);
            }

        }

    </style>

</head>
<body>

    <!-- HEADER -->

    <div class="topbar">

        <div class="left-section">

            <img 
                src="{{ url_for('static', filename='images/logo.png') }}" 
                alt="COOPORIGEN"
                class="logo">

            <div class="title-box">

                <h1>Portal BI - COOPORIGEN</h1>

                <span>
                    Inteligencia de Negocios • Plataforma Corporativa
                </span>

            </div>

        </div>

        <div class="right-section">

            <div class="support-box">

                <div class="support-title">
                    SOPORTE TÉCNICO
                </div>

                <div class="support-info">

                    coordinadorcumplimiento@cooporigen.com<br>

                    314 282 9508

                </div>

            </div>

            <a class="logout-btn" href="/logout">
                Cerrar sesión
            </a>

        </div>

    </div>

    <!-- POWER BI -->

    <div class="iframe-container">

        <iframe 
            title="Power BI"
            src="https://app.powerbi.com/view?r=eyJrIjoiOWUwZTBkMmUtMzRhYi00N2JlLTgzMmEtMzJkMjI1NmUzNTliIiwidCI6IjAwMTY5N2E4LWJmMzktNDVlMS1hMzAzLTNjMTBjNmE2YTQzOSIsImMiOjR9"
            allowfullscreen>
        </iframe>

    </div>

</body>
</html>
