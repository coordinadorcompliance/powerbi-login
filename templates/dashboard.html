<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard BI - COOPORIGEN</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .topbar{
            background:#3D9588;
            color:white;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .title{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .title img{
            width:45px;
            height:45px;
            border-radius:8px;
            object-fit:cover;
        }

        .title h2{
            margin:0;
            font-size:22px;
        }

        .logout-btn{
            background:#D4AF37;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
        }

        .logout-btn:hover{
            background:#b9962f;
        }

        iframe{
            width:100%;
            height:92vh;
            border:none;
        }

    </style>

</head>
<body>

    <div class="topbar">

        <div class="title">

            <img src="{{ url_for('static', filename='images/logo.png') }}" 
                 alt="COOPORIGEN">

            <h2>Portal BI - COOPORIGEN</h2>

        </div>

        <a class="logout-btn" href="/logout">
            Cerrar sesión
        </a>

    </div>

    <iframe 
        title="Power BI"
        src="https://app.powerbi.com/view?r=eyJrIjoiOWUwZTBkMmUtMzRhYi00N2JlLTgzMmEtMzJkMjI1NmUzNTliIiwidCI6IjAwMTY5N2E4LWJmMzktNDVlMS1hMzAzLTNjMTBjNmE2YTQzOSIsImMiOjR9"
        allowfullscreen>
    </iframe>

</body>
</html>
