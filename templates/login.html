<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal BI - COOPORIGEN</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #3D9588, #0B1F3A);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:45px;
            border-radius:20px;
            width:360px;
            text-align:center;
            box-shadow:0 12px 35px rgba(0,0,0,0.25);
        }

        h1{
            color:#3D9588;
            font-size:30px;
            margin-bottom:8px;
            letter-spacing:1px;
        }

        .subtitle{
            color:#777;
            margin-bottom:28px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:13px;
            margin-top:14px;
            border:1px solid #dcdcdc;
            border-radius:10px;
            font-size:14px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border:1px solid #3D9588;
            box-shadow:0 0 8px rgba(61,149,136,0.4);
        }

        button{
            width:100%;
            padding:13px;
            margin-top:24px;
            background:#D4AF37;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            background:#b9962f;
            transform:translateY(-2px);
        }

        .footer{
            margin-top:25px;
            font-size:12px;
            color:#999;
            line-height:20px;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>COOPORIGEN</h1>

        <div class="subtitle">
            Portal Corporativo BI
        </div>

        <form method="POST">

            <input 
                type="text" 
                name="username" 
                placeholder="Usuario" 
                required>

            <input 
                type="password" 
                name="password" 
                placeholder="Contraseña" 
                required>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <div class="footer">
            Inteligencia de Negocios • 2026<br>
            © Todos los derechos reservados - COOPORIGEN
        </div>

    </div>

</body>
</html>
