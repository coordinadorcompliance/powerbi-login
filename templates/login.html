<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal BI - CoopOrigen</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #3D9588, #0B1F3A);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:18px;
            width:340px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:15px;
        }

        h1{
            color:#3D9588;
            margin-bottom:5px;
            font-size:28px;
        }

        p{
            color:#777;
            margin-bottom:25px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:14px;
            box-sizing:border-box;
        }

        input:focus{
            outline:none;
            border:1px solid #3D9588;
            box-shadow:0 0 5px rgba(61,149,136,0.5);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:22px;
            background:#D4AF37;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            background:#b9962f;
            transform:scale(1.02);
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            color:#999;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <img src="{{ url_for('static', filename='images/logo.png') }}" 
             alt="Logo CoopOrigen"
             class="logo">

        <h1>COOPORIGEN</h1>

        <p>Portal Corporativo BI</p>

        <form method="POST">

            <input type="text" 
                   name="username" 
                   placeholder="Usuario" 
                   required>

            <input type="password" 
                   name="password" 
                   placeholder="Contraseña" 
                   required>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <div class="footer">
            Inteligencia de Negocios • 2026
        </div>

    </div>

</body>
</html>
