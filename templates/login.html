<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background: #f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:300px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:#0078d4;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#005ea2;
        }
    </style>

</head>
<body>

    <div class="login-box">
        <h2>Iniciar Sesión</h2>

        <form method="POST">

            <input type="text" 
                   name="username" 
                   placeholder="Usuario" 
                   required>

            <input type="password" 
                   name="password" 
                   placeholder="Contraseña" 
                   required>

            <button type="submit">
                Ingresar
            </button>

        </form>
    </div>

</body>
</html>
